services:
  - type: web
    name: habits-backend
    env: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate
    startCommand: gunicorn backend.wsgi:application --log-file -
    healthCheckPath: /
    envVars:
      - key: DEBUG
        value: "0"
      - key: PYTHON_VERSION
        value: "3.12.10"
      - key: ALLOWED_HOSTS
        value: "habits-backend.onrender.com"
      - key: CORS_ALLOWED_ORIGINS
        value: "https://YOUR_VERCEL_DOMAIN"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://YOUR_VERCEL_DOMAIN"
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: DB_SSL_REQUIRE
        value: "1"
databases:
  - name: habits-db
    plan: free
